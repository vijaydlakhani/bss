name: Automated Daily Stock Signal Alerts

on:
  schedule:
    # All key market scan slots enabled automatically (Mon-Fri)
    - cron: '0 4 * * 1-5'    # 09:30 AM IST (Morning Scan)
    - cron: '30 9 * * 1-5'   # 03:00 PM IST (Afternoon Scan)
    - cron: '15 8 * * 1-5'   # 01:45 PM IST (Market Close Scan)

  # Allows manual triggering anytime from the GitHub UI or API
  workflow_dispatch:

jobs:
  run-daily-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Automated News Sentiment Scan & Email Dispatch
        run: node scripts/run-alerts.js
        env:
          RECIPIENT_EMAIL: 'vijaydlakhani@gmail.com'
