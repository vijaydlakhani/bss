name: Automated Daily Stock Signal Alerts

on:
  schedule:
    # Morning Scan: 09:55 AM IST (04:25 AM UTC) Monday to Friday
    - cron: '25 4 * * 1-5'
    # Afternoon Closing Scan: 03:00 PM IST (09:30 AM UTC) Monday to Friday
    - cron: '30 9 * * 1-5'
  
  # Allows manual triggering from the GitHub Actions UI tab
  workflow_dispatch:

jobs:
  run-daily-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Automated News Sentiment Scan & Email Dispatch
        run: node scripts/run-alerts.js
        env:
          RECIPIENT_EMAIL: 'vijaydlakhani@gmail.com'
